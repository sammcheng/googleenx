services:
  - type: web
    name: food-price-comparison-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack pnpm install --frozen-lockfile
    startCommand: corepack pnpm --filter food-price-comparison-api start:runtime
    healthCheckPath: /health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MONGODB_ENABLED
        value: "false"
      - key: MONGODB_REQUIRED
        value: "false"
      - key: REDIS_ENABLED
        value: "false"
      - key: REDIS_REQUIRED
        value: "false"
  - type: web
    name: food-price-comparison-site
    runtime: static
    plan: free
    rootDir: .
    buildCommand: rm -rf public-site && mkdir -p public-site && cp -R docs/. public-site/
    staticPublishPath: ./public-site
    buildFilter:
      paths:
        - docs/**
        - render.yaml
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
